{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <div 
        class="min-h-screen flex items-center justify-center p-4" 
        style="
            background-image: url('static/images/background.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
        "
    >
        <div class="max-w-md w-full p-8 bg-white/90 backdrop-blur-sm rounded-xl shadow-2xl border border-gray-200" data-aos="fade-up">
            <h2 class="text-3xl font-extrabold text-gray-800 mb-6 text-center border-b pb-3">
                <i class="fas fa-lock mr-2 text-indigo-500"></i> Secure Login
            </h2>
            
            <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                <div class="space-y-2">
                    <label for="username" class="block text-sm font-medium text-gray-700">Username:</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 shadow-sm"
                        placeholder="Enter your username"
                    >
                </div>
                
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-medium text-gray-700">Password:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 shadow-sm"
                        placeholder="••••••••"
                    >
                </div>
                
                <button 
                    type="submit" 
                    class="w-full py-3 px-4 border border-transparent rounded-lg text-lg font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-300 shadow-lg hover:shadow-xl transform hover:scale-[1.01]"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i> Log In
                </button>
            </form>
            
            <p class="mt-6 text-center text-sm text-gray-600">
                New Parent? 
                <a href="{{ url_for('parent_register') }}" class="font-medium text-indigo-600 hover:text-indigo-500 transition duration-150 hover:underline">
                    Register Here
                </a>
            </p>
            
            <div class="mt-4 p-3 bg-red-50 text-red-700 text-xs rounded-lg text-center border border-red-200">
                <i class="fas fa-user-shield mr-1"></i> Admin Credentials: (admin / admin2025!)
            </div>
        </div>
    </div>
{% endblock %}
