{% extends "layout.html" %}

{% block title %}Parent Registration{% endblock %}

{% block content %}
<div 
    class="min-h-screen bg-cover bg-center bg-no-repeat flex items-center justify-center"
    style="background-image: url('{{ url_for("static", filename='images/background.jpg') }}');"
>
    <div class="max-w-xl mx-auto mt-8 p-10 bg-white/90 backdrop-blur-md rounded-xl shadow-2xl border border-gray-100" data-aos="fade-right">
        <h2 class="text-3xl font-extrabold text-gray-800 mb-6 text-center border-b pb-3">
            <i class="fas fa-user-plus mr-2 text-cyan-500"></i> Parent Registration
        </h2>
        
        <form method="POST" action="{{ url_for('parent_register') }}" class="space-y-6">
            
            <div class="space-y-2">
                <label for="username" class="block text-sm font-medium text-gray-700">Username (for login):</label>
                <input 
                    type="text" 
                    id="username"
                    name="username"
                    required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-cyan-500 focus:border-cyan-500 transition duration-150 shadow-sm"
                    placeholder="Choose a username"
                >
            </div>

            <div class="space-y-2">
                <label for="email" class="block text-sm font-medium text-gray-700">Email:</label>
                <input 
                    type="email"
                    id="email"
                    name="email"
                    required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-cyan-500 focus:border-cyan-500 transition duration-150 shadow-sm"
                    placeholder="name@example.com"
                >
            </div>

            <div class="space-y-2">
                <label for="contact" class="block text-sm font-medium text-gray-700">Contact Number (Optional):</label>
                <input 
                    type="text"
                    id="contact"
                    name="contact"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-cyan-500 focus:border-cyan-500 transition duration-150 shadow-sm"
                    placeholder="(123) 456-7890"
                >
            </div>

            <div class="space-y-2">
                <label for="password" class="block text-sm font-medium text-gray-700">Password:</label>
                <input 
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-cyan-500 focus:border-cyan-500 transition duration-150 shadow-sm"
                    placeholder="Create a secure password"
                >
            </div>

            <button 
                type="submit"
                class="w-full py-3 px-4 border border-transparent rounded-lg text-lg font-semibold text-white bg-cyan-600 hover:bg-cyan-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 transition duration-300 shadow-lg hover:shadow-xl transform hover:scale-[1.01]"
            >
                <i class="fas fa-user-check mr-2"></i> Register Account
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Already have an account? 
            <a href="{{ url_for('login') }}" class="font-medium text-cyan-600 hover:text-cyan-500 transition duration-150 hover:underline">
                Login
            </a>
        </p>
    </div>
</div>
{% endblock %}
